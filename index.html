<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0c111b;color:white}
.container{display:flex;height:100vh}

/* LEFT */
.left{
width:60%;
background:#1f2937;
padding:10px;
overflow:auto;
}

table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #333;text-align:center;font-size:13px}

.win{background:#22c55e;color:black}
.loss{background:#ef4444;color:white}

/* RIGHT */
.right{
width:40%;
background:#111827;
padding:10px;
}

.box{
background:#16a34a;
color:black;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.box.dark{
background:#020617;
color:white;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
font-weight:bold;
}

.winBtn{background:#22c55e}
.lossBtn{background:#ef4444}
.resetBtn{background:#374151;color:white}

</style>
</head>

<body>

<div class="container">

<!-- LEFT TABLE -->
<div class="left">
<table id="log">
<tr>
<th>#</th>
<th>R</th>
<th>Entry</th>
<th>P/L</th>
<th>Balance</th>
</tr>
</table>
</div>

<!-- RIGHT PANEL -->
<div class="right">

<div class="box">
<p id="capital"></p>
<p id="trades"></p>
<p id="wr"></p>
<p id="payout"></p>
</div>

<div class="box dark">
<p id="final"></p>
<p id="gain"></p>
<p id="winProfit"></p>
<p id="stop"></p>
<p id="maxLoss"></p>
</div>

<div class="box dark">
<p id="next"></p>
<p id="status"></p>
</div>

<button class="winBtn" onclick="trade('W')">WIN</button>
<button class="lossBtn" onclick="trade('L')">LOSS</button>
<button class="resetBtn" onclick="reset()">RESET</button>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("pro_full")) || {
balance:1500,
start:1500,
initialStart:1500,
wins:0,
loss:0,
step:0,
payout:0.92,
trades:[],
stopLoss:-50,
target:100
}

// ENTRY
function entry(){
return data.step==0?12:data.step==1?18:24
}

// SAVE
function save(){
localStorage.setItem("pro_full",JSON.stringify(data))
}

// UPDATE
function update(){

let total=data.wins+data.loss
let wr=total>0?((data.wins/total)*100).toFixed(1):0
let pnl=data.balance-data.initialStart

document.getElementById("capital").innerText="Capital: "+data.initialStart
document.getElementById("trades").innerText="Trades: "+total
document.getElementById("wr").innerText="WinRate: "+wr+"%"
document.getElementById("payout").innerText="Payout: "+(data.payout*100)+"%"

document.getElementById("final").innerText="Capital Final: "+data.balance.toFixed(2)
document.getElementById("gain").innerText="Account Gain: "+((pnl/data.initialStart)*100).toFixed(2)+"%"
document.getElementById("winProfit").innerText="Profit: "+pnl.toFixed(2)
document.getElementById("stop").innerText="Stop Loss: "+data.stopLoss
document.getElementById("maxLoss").innerText="Max Loss Limit: 3"

document.getElementById("next").innerText="Next Entry: "+entry()

let status="GO"
if(pnl<=data.stopLoss) status="STOP"
if(pnl>=data.target) status="TARGET"

document.getElementById("status").innerText="Status: "+status

// TABLE
let log=document.getElementById("log")
log.innerHTML=`
<tr><th>#</th><th>R</th><th>Entry</th><th>P/L</th><th>Balance</th></tr>`

data.trades.forEach((t,i)=>{
log.innerHTML+=`
<tr>
<td>${i+1}</td>
<td class="${t.r=='W'?'win':'loss'}">${t.r}</td>
<td>${t.e}</td>
<td>${t.p.toFixed(2)}</td>
<td>${t.b.toFixed(2)}</td>
</tr>`
})

}

// TRADE
function trade(type){

let e=entry()
let p=0

if(type=="W"){
p=e*data.payout
data.balance+=p
data.wins++
data.step=0
}else{
p=-e
data.balance-=e
data.loss++
data.step++
}

data.trades.push({
r:type,e:e,p:p,b:data.balance
})

save()
update()
}

// RESET
function reset(){
localStorage.removeItem("pro_full")
location.reload()
}

update()

</script>

</body>
</html>

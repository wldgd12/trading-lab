<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#0b1220;
  color:white;
  font-family:Arial;
  text-align:center;
}

.card{
  background:#111827;
  margin:12px;
  padding:18px;
  border-radius:16px;
}

button{
  padding:14px;
  margin:6px;
  border:none;
  border-radius:10px;
  font-size:15px;
}

.win{background:#22c55e}
.loss{background:#ef4444}
.reset{background:#374151}
.settings{background:#3b82f6}

.green{color:#22c55e}
.red{color:#ef4444}
</style>
</head>

<body>

<h2>🚀 Trading Lab</h2>

<div class="card">
<p id="balance"></p>
<p id="profit"></p>
<p id="winrate"></p>
<p id="next"></p>
</div>

<button class="win" onclick="trade('W')">WIN</button>
<button class="loss" onclick="trade('L')">LOSS</button>
<button class="reset" onclick="reset()">RESET</button>
<button class="settings" onclick="settings()">⚙️</button>

<script>

// ===== DATA =====
let data = JSON.parse(localStorage.getItem("simple_app")) || {
  balance:1500,
  start:1500,
  wins:0,
  loss:0,
  step:0,
  payout:0.8
}

// ===== ENTRY =====
function entry(){
  return data.step==0?12:data.step==1?18:24
}

// ===== SAVE =====
function save(){
  localStorage.setItem("simple_app",JSON.stringify(data))
}

// ===== UPDATE =====
function update(){

let total=data.wins+data.loss
let wr=total>0?((data.wins/total)*100).toFixed(1):0
let pnl=data.balance-data.start

document.getElementById("balance").innerText=
"💰 Balance: "+data.balance.toFixed(2)

document.getElementById("profit").innerHTML=
"📈 <span class='"+(pnl>=0?"green":"red")+"'>"+pnl.toFixed(2)+"</span>"

document.getElementById("winrate").innerText=
"WinRate: "+wr+"%"

document.getElementById("next").innerText=
"Next: "+entry()+"$ | Payout: "+(data.payout*100)+"%"

}

// ===== TRADE =====
function trade(type){

let e=entry()

if(type=="W"){
data.balance=Number((data.balance + e*data.payout).toFixed(2))
data.wins++
data.step=0
}else{
data.balance=Number((data.balance - e).toFixed(2))
data.loss++
data.step++
}

save()
update()
}

// ===== SETTINGS =====
function settings(){

let b=prompt("رأس المال",data.balance)
let p=prompt("نسبة الربح (مثال 0.8)",data.payout)

if(b){
data.balance=Number(b)
data.start=Number(b)
}

if(p){
data.payout=Number(p)
}

save()
update()
}

// ===== RESET =====
function reset(){
data={balance:1500,start:1500,wins:0,loss:0,step:0,payout:0.8}
save()
update()
}

update()

</script>

</body>
</html>

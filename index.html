<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0c111b;color:white}
.container{display:flex;height:100vh}

/* LEFT */
.left{width:60%;background:#1f2937;padding:10px;overflow:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #333;text-align:center;font-size:13px}
.win{background:#22c55e;color:black}
.loss{background:#ef4444;color:white}

/* RIGHT */
.right{width:40%;background:#111827;padding:10px}
.box{background:#16a34a;color:black;padding:10px;border-radius:10px;margin-bottom:10px}
.dark{background:#020617;color:white}

button{padding:10px;margin:5px;border:none;border-radius:8px;font-weight:bold}
.winBtn{background:#22c55e}
.lossBtn{background:#ef4444}
.resetBtn{background:#374151;color:white}
.settingsBtn{background:#3b82f6;color:white}
</style>
</head>

<body>

<div class="container">

<div class="left">
<table id="log">
<tr><th>#</th><th>R</th><th>Entry</th><th>P/L</th><th>Balance</th></tr>
</table>
</div>

<div class="right">

<div class="box">
<p id="capital"></p>
<p id="trades"></p>
<p id="wr"></p>
<p id="payout"></p>
</div>

<div class="box dark">
<p id="final"></p>
<p id="gain"></p>
<p id="profit"></p>
<p id="stop"></p>
<p id="limit"></p>
</div>

<div class="box dark">
<p id="next"></p>
<p id="status"></p>
</div>

<button class="winBtn" onclick="trade('W')">WIN</button>
<button class="lossBtn" onclick="trade('L')">LOSS</button>
<button class="settingsBtn" onclick="settings()">⚙️</button>
<button class="resetBtn" onclick="reset()">RESET</button>

</div>
</div>

<script>

// ===== DATA =====
let data = JSON.parse(localStorage.getItem("ultimate")) || {
balance:1500,
start:1500,
initialStart:1500,
wins:0,
loss:0,
step:0,
payout:0.92,
target:100,
stopLoss:-50,
maxLoss:3,
trades:[],

// SESSION
sessionStart: Date.now(),
sessionTrades: 0,
sessionProfit: 0,

// SMART RISK
riskPercent:2,
autoRisk:true,
minRisk:1,
maxRisk:5
}

// ===== ENTRY =====
function entry(){
let base = data.balance * (data.riskPercent / 100)
if(data.step==0) return Number(base.toFixed(2))
if(data.step==1) return Number((base * 1.5).toFixed(2))
return Number((base * 2).toFixed(2))
}

// ===== SMART RISK =====
function updateRisk(){
let last = data.trades.slice(-3)
let wins = last.filter(t=>t.r=="W").length
let losses = last.filter(t=>t.r=="L").length

if(wins >= 2){
data.riskPercent = Math.min(data.riskPercent + 0.5, data.maxRisk)
}
if(losses >= 2){
data.riskPercent = Math.max(data.riskPercent - 0.5, data.minRisk)
}
}

// ===== TIME =====
function formatTime(ms){
let t=Math.floor(ms/1000)
let m=Math.floor(t/60)
let s=t%60
return m+":"+(s<10?"0":"")+s
}

// ===== SAVE =====
function save(){
localStorage.setItem("ultimate",JSON.stringify(data))
}

// ===== STREAK =====
function streak(){
let s=0
for(let i=data.trades.length-1;i>=0;i--){
if(data.trades[i].r=="L") s++
else break
}
return s
}

// ===== BLOCK =====
function blocked(){
let pnl=data.balance-data.initialStart
return pnl<=data.stopLoss || pnl>=data.target || streak()>=data.maxLoss
}

// ===== UPDATE =====
function update(){

let total=data.wins+data.loss
let wr=total>0?((data.wins/total)*100).toFixed(1):0
let pnl=data.balance-data.initialStart

let time=formatTime(Date.now()-data.sessionStart)
let rate=data.riskPercent

document.getElementById("capital").innerText="Capital: "+data.initialStart
document.getElementById("trades").innerText="Trades: "+total
document.getElementById("wr").innerText="WinRate: "+wr+"%"
document.getElementById("payout").innerText="Payout: "+(data.payout*100)+"%"

document.getElementById("final").innerText="Capital Final: "+data.balance.toFixed(2)
document.getElementById("gain").innerText="Gain: "+((pnl/data.initialStart)*100).toFixed(2)+"%"
document.getElementById("profit").innerText="Profit: "+pnl.toFixed(2)
document.getElementById("stop").innerText="Stop Loss: "+data.stopLoss
document.getElementById("limit").innerText="Max Loss: "+data.maxLoss

document.getElementById("next").innerText="Next Entry: "+entry()

let status="GO"
if(pnl<=data.stopLoss) status="STOP LOSS"
if(pnl>=data.target) status="TARGET"
if(streak()>=data.maxLoss) status="STREAK STOP"

document.getElementById("status").innerText=
"Status: "+status+
" | ⏱ "+time+
" | Session: "+data.sessionProfit.toFixed(2)+
" | Risk: "+rate.toFixed(1)+"%"

// TABLE
let log=document.getElementById("log")
log.innerHTML=`<tr><th>#</th><th>R</th><th>Entry</th><th>P/L</th><th>Balance</th></tr>`

data.trades.slice(-50).forEach((t,i)=>{
log.innerHTML+=`
<tr>
<td>${i+1}</td>
<td class="${t.r=='W'?'win':'loss'}">${t.r}</td>
<td>${t.e}</td>
<td>${t.p.toFixed(2)}</td>
<td>${t.b.toFixed(2)}</td>
</tr>`
})

}

// ===== TRADE =====
function trade(type){

if(blocked()){
alert("🚫 Trading Stopped")
return
}

let e=entry()
let p=0

if(type=="W"){
p=e*data.payout
data.balance=Number((data.balance+p).toFixed(2))
data.wins++
data.step=0
}else{
p=-e
data.balance=Number((data.balance-e).toFixed(2))
data.loss++
data.step++
}

// SESSION
data.sessionTrades++
data.sessionProfit=Number((data.sessionProfit+p).toFixed(2))

data.trades.push({r:type,e:e,p:p,b:data.balance})

// SMART APPLY
if(data.autoRisk){
updateRisk()
}

save()
update()
}

// ===== SETTINGS =====
function settings(){

let b=prompt("Capital",data.balance)
let p=prompt("Payout (0.92)",data.payout)
let r=prompt("Risk %",data.riskPercent)
let auto=confirm("Auto Risk? OK = YES")
let min=prompt("Min Risk",data.minRisk)
let max=prompt("Max Risk",data.maxRisk)

if(b){
data.balance=Number(b)
data.start=Number(b)
data.initialStart=Number(b)
data.sessionStart=Date.now()
data.sessionTrades=0
data.sessionProfit=0
}

if(p){data.payout=Number(p)}
if(r){data.riskPercent=Number(r)}
data.autoRisk=auto
if(min){data.minRisk=Number(min)}
if(max){data.maxRisk=Number(max)}

save()
update()
}

// ===== RESET =====
function reset(){
localStorage.removeItem("ultimate")
location.reload()
}

setInterval(update,1000)
update()

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:#0b1220;color:white;font-family:Arial;text-align:center}
.card{background:#111827;margin:12px;padding:18px;border-radius:16px}
button{padding:12px;margin:6px;border:none;border-radius:10px;font-size:14px}
.win{background:#22c55e}
.loss{background:#ef4444}
.settings{background:#3b82f6}
.reset{background:#374151}
.green{color:#22c55e}
.red{color:#ef4444}
td{padding:6px;border-bottom:1px solid #222;font-size:12px}
</style>
</head>

<body>

<h2>🚀 Trading Lab AUTO PRO</h2>

<div class="card">
<p id="balance"></p>
<p id="profit"></p>
<p id="stats"></p>
<p id="next"></p>
<p id="status"></p>
</div>

<button class="win" onclick="trade('W')">WIN</button>
<button class="loss" onclick="trade('L')">LOSS</button>
<button class="settings" onclick="settings()">⚙️</button>
<button class="reset" onclick="reset()">RESET</button>

<div class="card">
<table id="log"></table>
</div>

<script>

// ===== DATA =====
let data = JSON.parse(localStorage.getItem("auto_pro_v2")) || {
  balance:1500,
  start:1500,
  initialStart:1500, // 🔥 ثابت
  wins:0,
  loss:0,
  step:0,
  payout:0.8,
  compoundRate:0.02,
  trades:[],

  maxEntry:100,
  stopLoss:-50,
  target:100,
  maxStreak:3
}

// ===== ENTRY =====
function entry(){
  return data.step==0?12:data.step==1?18:24
}

// ===== SAVE =====
function save(){
  localStorage.setItem("auto_pro_v2",JSON.stringify(data))
}

// ===== STREAK =====
function losingStreak(){
let s=0
for(let i=data.trades.length-1;i>=0;i--){
if(data.trades[i].r=="L") s++
else break
}
return s
}

// ===== UPDATE =====
function update(){

let total=data.wins+data.loss
let pnl=data.balance-data.initialStart // 🔥 FIX

document.getElementById("balance").innerText="💰 "+data.balance.toFixed(2)

document.getElementById("profit").innerHTML=
"📈 <span class='"+(pnl>=0?"green":"red")+"'>"+pnl.toFixed(2)+"</span>"

document.getElementById("stats").innerText=
"Trades: "+total+" | Win: "+data.wins+" | Loss: "+data.loss

document.getElementById("next").innerText=
"Next Entry: "+entry()+"$"

let status="GO ✅"

if(pnl<=data.stopLoss) status="STOP LOSS 🚫"
if(pnl>=data.target) status="TARGET 🎯"
if(losingStreak()>=data.maxStreak) status="STREAK STOP ⚠️"

document.getElementById("status").innerText=status

// ===== LOG =====
let log=document.getElementById("log")
log.innerHTML="<tr><td>#</td><td>R</td><td>$</td><td>P</td></tr>"

data.trades.slice(-10).forEach((t,i)=>{
log.innerHTML+=
"<tr><td>"+(i+1)+"</td><td>"+t.r+"</td><td>"+t.e+"</td><td>"+t.p.toFixed(2)+"</td></tr>"
})

}

// ===== BLOCK =====
function blocked(){
let pnl=data.balance-data.initialStart
return (
pnl<=data.stopLoss ||
pnl>=data.target ||
losingStreak()>=data.maxStreak
)
}

// ===== TRADE =====
function trade(type){

if(blocked()){
alert("🚫 التداول موقوف")
return
}

let e=entry()
let p=0

if(type=="W"){
p=e*data.payout
data.balance=Number((data.balance+p).toFixed(2))
data.wins++
data.step=0

// 🔥 COMPOUND صحيح
data.start = Number((data.start + (data.start * data.compoundRate)).toFixed(2))

}else{
p=-e
data.balance=Number((data.balance-e).toFixed(2))
data.loss++
data.step++
}

if(entry()>data.maxEntry){
data.step=0
}

data.trades.push({r:type,e:e,p:p})

save()
update()
}

// ===== SETTINGS =====
function settings(){

let b=prompt("رأس المال",data.balance)
let p=prompt("نسبة الربح",data.payout)
let c=prompt("نسبة النمو (0.02)",data.compoundRate)
let m=prompt("أقصى دخول",data.maxEntry)
let s=prompt("وقف الخسارة",data.stopLoss)
let t=prompt("الهدف",data.target)

if(b){
data.balance=Number(b)
data.start=Number(b)
data.initialStart=Number(b) // 🔥 مهم
}

if(p){data.payout=Number(p)}
if(c){data.compoundRate=Number(c)}
if(m){data.maxEntry=Number(m)}
if(s){data.stopLoss=Number(s)}
if(t){data.target=Number(t)}

save()
update()
}

// ===== RESET =====
function reset(){
localStorage.removeItem("auto_pro_v2")
location.reload()
}

update()

</script>

</body>
</html>

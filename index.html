<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:#05070f;color:#fff;text-align:center;font-family:Arial}
.card{background:#0f172a;margin:12px;padding:18px;border-radius:18px}
button{padding:12px;margin:4px;border:none;border-radius:10px}
.win{background:#22c55e}
.loss{background:#ef4444}
.reset{background:#374151}
.settings{background:#2563eb}
td{font-size:12px;padding:5px;border-bottom:1px solid #222}
.green{color:#22c55e}
.red{color:#ef4444}
</style>
</head>

<body>

<h2>🧠 Trading Lab AI</h2>

<div class="card">
<p id="balance"></p>
<p id="profit"></p>
<p id="winrate"></p>
<p id="status"></p>
<p id="goal"></p>
<p id="advice"></p>
<p id="ai"></p>
</div>

<button class="win" onclick="trade('W')">WIN</button>
<button class="loss" onclick="trade('L')">LOSS</button>
<button class="reset" onclick="reset()">RESET</button>
<button class="settings" onclick="settings()">⚙️</button>

<div class="card">
<canvas id="chart" height="150"></canvas>
</div>

<div class="card">
<table id="log"></table>
</div>

<script>

let data = JSON.parse(localStorage.getItem("ai_lab")) || {
  balance:1500,start:1500,wins:0,loss:0,step:0,
  trades:[],goal:50,stop:-30
}

function entry(){
  return data.step==0?12:data.step==1?18:24
}

function save(){
  localStorage.setItem("ai_lab",JSON.stringify(data))
}

// ===== AI =====
function analyze(){

let last = data.trades.slice(-10)

let wins = last.filter(t=>t.r=="W").length
let losses = last.filter(t=>t.r=="L").length

let streak = 0
for(let i=data.trades.length-1;i>=0;i--){
if(data.trades[i].r=="L") streak++
else break
}

let result="🔥 ممتاز"
if(losses>wins) result="⚠️ أدائك ضعيف"
if(streak>=3) result="🚨 وقف فورًا - خسائر متتالية"

return result
}

// ===== UPDATE =====
function update(){

let total=data.wins+data.loss
let wr=total>0?((data.wins/total)*100).toFixed(1):0
let pnl=(data.balance-data.start)

document.getElementById("balance").innerText="💰 "+data.balance.toFixed(2)
document.getElementById("profit").innerText="📈 "+pnl.toFixed(2)
document.getElementById("winrate").innerText="WinRate: "+wr+"%"

let status="GO ✅"
if(pnl<=data.stop) status="STOP 🚫"
if(pnl>=data.goal) status="TARGET 🎯"

document.getElementById("status").innerText=status
document.getElementById("goal").innerText="Goal: "+data.goal+" | Stop: "+data.stop
document.getElementById("advice").innerText="استمر 👍"
document.getElementById("ai").innerText=analyze()

// جدول
let log=document.getElementById("log")
log.innerHTML="<tr><td>#</td><td>R</td><td>$</td><td>P</td></tr>"
data.trades.slice(-10).forEach((t,i)=>{
log.innerHTML+="<tr><td>"+(i+1)+"</td><td>"+t.r+"</td><td>"+t.e+"</td><td>"+t.p+"</td></tr>"
})

// رسم
let c=document.getElementById("chart")
let ctx=c.getContext("2d")
ctx.clearRect(0,0,c.width,c.height)

ctx.strokeStyle="#22c55e"
ctx.beginPath()

let bal=data.start
let stepTemp=0

data.trades.forEach((t,i)=>{
let e=stepTemp==0?12:stepTemp==1?18:24

if(t.r=="W"){bal+=e*0.8;stepTemp=0}
else{bal-=e;stepTemp++}

let x=i*(c.width/(data.trades.length||1))
let y=c.height-(bal-1400)

if(i==0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)
})

ctx.stroke()

}

// ===== ACTION =====
function trade(type){

let e=entry()
let p=0

if(type=="W"){
p=e*0.8
data.balance=Number((data.balance+p).toFixed(2))
data.wins++
data.step=0
}else{
p=-e
data.balance=Number((data.balance-e).toFixed(2))
data.loss++
data.step++
}

data.trades.push({r:type,e:e,p:p})

save()
update()
}

function settings(){

let b=prompt("رأس المال",data.balance)
let g=prompt("الهدف",data.goal)
let s=prompt("وقف الخسارة",data.stop)

if(b){data.balance=Number(b);data.start=Number(b)}
if(g){data.goal=Number(g)}
if(s){data.stop=Number(s)}

save()
update()
}

function reset(){
data={balance:1500,start:1500,wins:0,loss:0,step:0,trades:[],goal:50,stop:-30}
save()
update()
}

update()

</script>

</body>
</html>
